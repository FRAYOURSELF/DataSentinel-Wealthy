global:
  scrape_interval: 15s

scrape_configs:
  - job_name: fastapi
    metrics_path: /metrics
    static_configs:
      - targets: ["localhost:8000"]

  - job_name: go-prime
    metrics_path: /metrics
    static_configs:
      - targets: ["localhost:8081"]

  - job_name: celery-worker
    metrics_path: /metrics
    static_configs:
      - targets: ["localhost:9103"]
