services:
  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"

  clickhouse:
    image: clickhouse/clickhouse-server:24.8
    ports:
      - "8123:8123"
      - "9000:9000"
    volumes:
      - clickhouse_data:/var/lib/clickhouse
      - ./observability/clickhouse-init.sql:/docker-entrypoint-initdb.d/init.sql

  fastapi-app:
    build:
      context: ./fastapi_app
    environment:
      SQLITE_PATH: /data/users.db
      REDIS_URL: redis://redis:6379/0
      CELERY_BROKER_URL: redis://redis:6379/0
      CELERY_RESULT_BACKEND: redis://redis:6379/1
      CLICKHOUSE_HOST: clickhouse
      CLICKHOUSE_PORT: 8123
      OTEL_EXPORTER_OTLP_ENDPOINT: http://otel-collector:4317
      JWT_SECRET_KEY: replace-with-strong-secret
      JWT_ALGORITHM: HS256
      JWT_EXPIRY_MINUTES: 60
      LOGIN_ATTEMPTS_PER_MINUTE: 20
      LOGIN_ATTEMPTS_PER_USER_PER_MINUTE: 10
      LOGIN_MAX_FAILURES_BEFORE_BLOCK: 8
      LOGIN_FAILURE_WINDOW_SECONDS: 900
      LOGIN_BLOCK_SECONDS: 900
    ports:
      - "8000:8000"
    volumes:
      - sqlite_data:/data
    depends_on:
      - redis
      - clickhouse
      - otel-collector

  fastapi-db-init:
    build:
      context: ./fastapi_app
    command: ["python", "scripts/init_db.py"]
    environment:
      SQLITE_PATH: /data/users.db
    volumes:
      - sqlite_data:/data
    depends_on:
      - fastapi-app

  celery-worker:
    build:
      context: ./celery_worker
    environment:
      CELERY_BROKER_URL: redis://redis:6379/0
      CELERY_RESULT_BACKEND: redis://redis:6379/1
      REDIS_URL: redis://redis:6379/0
      CLICKHOUSE_HOST: clickhouse
      CLICKHOUSE_PORT: 8123
      OTEL_EXPORTER_OTLP_ENDPOINT: http://otel-collector:4317
    depends_on:
      - redis
      - clickhouse
      - otel-collector

  otel-collector:
    image: otel/opentelemetry-collector-contrib:0.104.0
    command: ["--config=/etc/otelcol-contrib/config.yaml"]
    volumes:
      - ./observability/otel/otel-collector-config.yaml:/etc/otelcol-contrib/config.yaml
    ports:
      - "4317:4317"
      - "4318:4318"

  victoriametrics:
    image: victoriametrics/victoria-metrics:v1.102.1
    command:
      - "-promscrape.config=/etc/prometheus/prometheus.yml"
    volumes:
      - ./observability/prometheus.yml:/etc/prometheus/prometheus.yml
      - vm_data:/victoria-metrics-data
    ports:
      - "8428:8428"
    depends_on:
      - fastapi-app
      - celery-worker

  grafana:
    image: grafana/grafana:11.1.2
    ports:
      - "3000:3000"
    environment:
      GF_SECURITY_ADMIN_USER: admin
      GF_SECURITY_ADMIN_PASSWORD: admin
    volumes:
      - grafana_data:/var/lib/grafana
      - ./observability/grafana/provisioning:/etc/grafana/provisioning
      - ./observability/grafana/dashboards:/var/lib/grafana/dashboards
    depends_on:
      - victoriametrics

  locust:
    image: locustio/locust:2.29.1
    ports:
      - "8089:8089"
    volumes:
      - ./locust:/mnt/locust
    command: ["-f", "/mnt/locust/locustfile.py", "--host", "http://fastapi-app:8000"]
    depends_on:
      - fastapi-app

volumes:
  sqlite_data:
  clickhouse_data:
  vm_data:
  grafana_data:
